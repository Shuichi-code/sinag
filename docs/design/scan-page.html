<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "background": "#fffbff",
              "surface-container-high": "#f2eedb",
              "on-error": "#ffffff",
              "surface-tint": "#8d5900",
              "on-tertiary": "#ffffff",
              "on-primary": "#ffffff",
              "primary-fixed-dim": "#e79400",
              "surface-bright": "#fffbff",
              "surface-dim": "#e7e3ce",
              "error-dim": "#b92902",
              "tertiary": "#00734e",
              "inverse-on-surface": "#a09d8f",
              "on-primary-fixed": "#2a1700",
              "on-tertiary-fixed-variant": "#006544",
              "inverse-primary": "#f8a010",
              "primary-container": "#f8a010",
              "surface-container-highest": "#ece9d4",
              "secondary": "#4b658d",
              "surface-container-lowest": "#ffffff",
              "on-secondary-fixed-variant": "#375178",
              "on-primary-container": "#4a2c00",
              "on-error-container": "#520c00",
              "tertiary-fixed": "#69f6b8",
              "secondary-container": "#b9d3ff",
              "secondary-fixed": "#b9d3ff",
              "surface": "#fffbff",
              "on-surface": "#39382d",
              "on-surface-variant": "#666558",
              "on-secondary-fixed": "#18355a",
              "on-background": "#39382d",
              "outline-variant": "#bcb9ab",
              "surface-container-low": "#fefae8",
              "secondary-fixed-dim": "#aac5f2",
              "tertiary-container": "#69f6b8",
              "surface-variant": "#ece9d4",
              "on-secondary": "#ffffff",
              "tertiary-dim": "#006544",
              "on-tertiary-fixed": "#00452d",
              "primary": "#8d5900",
              "on-tertiary-container": "#005a3c",
              "inverse-surface": "#0f0f06",
              "tertiary-fixed-dim": "#58e7ab",
              "on-secondary-container": "#2d486e",
              "primary-fixed": "#f8a010",
              "error": "#be2d06",
              "on-primary-fixed-variant": "#563400",
              "outline": "#838174",
              "secondary-dim": "#3f5980",
              "primary-dim": "#7d4e00",
              "error-container": "#f95630",
              "surface-container": "#f8f4e2"
            },
            fontFamily: {
              "headline": ["Plus Jakarta Sans"],
              "body": ["Be Vietnam Pro"],
              "label": ["Be Vietnam Pro"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .glass-effect {
        background: rgba(255, 251, 255, 0.8);
        backdrop-filter: blur(20px);
      }
      .sunshine-gradient {
        background: linear-gradient(135deg, #8d5900 0%, #f8a010 100%);
      }
      .ambient-shadow {
        box-shadow: 0px 12px 32px rgba(141, 89, 0, 0.08);
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-surface font-body text-on-surface min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="bg-[#fefae8] dark:bg-stone-900 sticky top-0 z-50 flex justify-between items-center w-full px-6 h-16 no-border tonal-shift">
<button class="text-[#8d5900] dark:text-[#f8a010] hover:opacity-80 transition-opacity Active: scale-95 duration-150">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-plus-jakarta text-lg font-semibold tracking-tight text-[#8d5900] dark:text-[#f8a010]">I-scan ang Bill</h1>
<button class="text-[#8d5900] dark:text-[#f8a010] hover:opacity-80 transition-opacity Active: scale-95 duration-150">
<span class="material-symbols-outlined">wb_sunny</span>
</button>
</header>
<main class="flex-grow flex flex-col items-center justify-center px-6 py-8 gap-8 max-w-2xl mx-auto w-full">
<!-- Instruction Card -->
<section class="w-full bg-surface-container-low rounded-xl p-8 flex flex-col items-center text-center gap-6 relative overflow-hidden">
<div class="absolute -top-12 -right-12 w-32 h-32 rounded-full bg-primary-container opacity-10 blur-3xl"></div>
<div class="space-y-2 relative z-10">
<span class="font-label text-xs tracking-widest text-primary uppercase font-bold">Gabay sa Pag-scan</span>
<p class="font-headline text-xl font-semibold text-on-surface leading-tight">
                    Ilagay ang iyong bill sa patag na surface at kunan ng litrato mula sa itaas
                </p>
</div>
<div class="w-full aspect-square max-w-[280px] bg-surface-container-lowest rounded-xl flex items-center justify-center relative ambient-shadow group">
<div class="relative w-48 h-48 flex items-center justify-center">
<div class="absolute w-32 h-40 bg-surface-container-high rounded-sm rotate-[-5deg] border border-outline-variant/20 shadow-sm flex flex-col p-4 gap-2">
<div class="h-2 w-3/4 bg-outline-variant/30 rounded"></div>
<div class="h-2 w-1/2 bg-outline-variant/30 rounded"></div>
<div class="mt-auto h-4 w-full bg-primary/10 rounded"></div>
</div>
<div class="absolute w-24 h-44 border-[6px] border-on-surface rounded-lg shadow-xl bg-surface flex flex-col items-center justify-center transform translate-y-[-20px] translate-x-[10px] rotate-[10px]">
<div class="w-12 h-1 bg-on-surface/10 rounded-full mb-auto mt-2"></div>
<span class="material-symbols-outlined text-primary-fixed-dim text-4xl" style="font-variation-settings: 'FILL' 1;">photo_camera</span>
<div class="w-2 h-2 rounded-full bg-on-surface mt-auto mb-2"></div>
</div>
</div>
<div class="absolute inset-0 bg-gradient-to-t from-primary/5 to-transparent pointer-events-none rounded-xl"></div>
</div>
</section>
<div class="w-full flex flex-col gap-4">
<button class="sunshine-gradient w-full py-5 rounded-full flex items-center justify-center gap-3 ambient-shadow hover:opacity-90 transition-all active:scale-[0.98]">
<span class="material-symbols-outlined text-white">photo_camera</span>
<span class="font-headline text-white font-bold tracking-tight">Kunan ng Litrato</span>
</button>
<button class="bg-secondary-container w-full py-5 rounded-full flex items-center justify-center gap-3 hover:bg-secondary-container/80 transition-all active:scale-[0.98]">
<span class="material-symbols-outlined text-on-secondary-container">gallery_thumbnail</span>
<span class="font-headline text-on-secondary-container font-semibold tracking-tight">Pumili mula sa Gallery</span>
</button>
</div>
<div class="flex items-center gap-3 py-4 opacity-60">
<span class="material-symbols-outlined text-primary animate-pulse" style="font-variation-settings: 'FILL' 1;">light_mode</span>
<p class="font-body text-sm text-on-surface-variant italic">Nakahanda na ang iyong Sinag reader...</p>
</div>
</main>
<footer class="bg-[#f2eedb] dark:bg-stone-900 flex flex-col items-center gap-4 w-full p-8 tonal-shift mt-auto">
<div class="flex gap-6">
<a class="font-be-vietnam text-xs leading-relaxed text-stone-500 hover:text-[#f8a010] transition-colors duration-200" href="#">Privacy</a>
<a class="font-be-vietnam text-xs leading-relaxed text-stone-500 hover:text-[#f8a010] transition-colors duration-200" href="#">Terms</a>
<a class="font-be-vietnam text-xs leading-relaxed text-stone-500 hover:text-[#f8a010] transition-colors duration-200" href="#">Support</a>
</div>
<p class="font-be-vietnam text-xs leading-relaxed text-[#8d5900] dark:text-[#f8a010] font-medium opacity-70">
            © 2024 Sinag Solar. Crafted for Davao City.
        </p>
</footer>
</body></html>
