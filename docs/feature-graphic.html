<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; }
  body { width: 1024px; height: 500px; overflow: hidden; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c" width="1024" height="500"></canvas>
<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');
const W = 1024, H = 500;

// Background gradient - warm amber to deep orange
const bg = ctx.createLinearGradient(0, 0, W, H);
bg.addColorStop(0, '#FF8F00');
bg.addColorStop(0.3, '#F57C00');
bg.addColorStop(0.6, '#EF6C00');
bg.addColorStop(1, '#E65100');
ctx.fillStyle = bg;
ctx.fillRect(0, 0, W, H);

// Subtle radial highlight
const highlight = ctx.createRadialGradient(W * 0.3, H * 0.4, 50, W * 0.3, H * 0.4, 400);
highlight.addColorStop(0, 'rgba(255, 213, 79, 0.3)');
highlight.addColorStop(1, 'rgba(255, 213, 79, 0)');
ctx.fillStyle = highlight;
ctx.fillRect(0, 0, W, H);

// Decorative sun rays in the left area
ctx.save();
ctx.translate(180, 250);
const rayCount = 16;
for (let i = 0; i < rayCount; i++) {
  const angle = (i * Math.PI * 2) / rayCount;
  ctx.save();
  ctx.rotate(angle);
  ctx.beginPath();
  ctx.moveTo(-8, -100);
  ctx.lineTo(8, -100);
  ctx.lineTo(4, -200);
  ctx.lineTo(-4, -200);
  ctx.closePath();
  ctx.fillStyle = 'rgba(255, 255, 255, 0.12)';
  ctx.fill();
  ctx.restore();
}
ctx.restore();

// Sun circle on the left
ctx.save();
ctx.translate(180, 250);
const sunGrad = ctx.createRadialGradient(-10, -10, 10, 0, 0, 85);
sunGrad.addColorStop(0, '#FFF9C4');
sunGrad.addColorStop(0.3, '#FFE082');
sunGrad.addColorStop(0.7, '#FFB300');
sunGrad.addColorStop(1, '#FF8F00');
ctx.fillStyle = sunGrad;
ctx.beginPath();
ctx.arc(0, 0, 85, 0, Math.PI * 2);
ctx.fill();

// Solar panel inside sun
const pw = 55, ph = 65, pr = 6;
const px = -pw/2, py = -ph/2 + 5;
ctx.beginPath();
ctx.moveTo(px + pr, py);
ctx.lineTo(px + pw - pr, py);
ctx.quadraticCurveTo(px + pw, py, px + pw, py + pr);
ctx.lineTo(px + pw, py + ph - pr);
ctx.quadraticCurveTo(px + pw, py + ph, px + pw - pr, py + ph);
ctx.lineTo(px + pr, py + ph);
ctx.quadraticCurveTo(px, py + ph, px, py + ph - pr);
ctx.lineTo(px, py + pr);
ctx.quadraticCurveTo(px, py, px + pr, py);
ctx.closePath();
const panelGrad = ctx.createLinearGradient(px, py, px + pw, py + ph);
panelGrad.addColorStop(0, '#5D4037');
panelGrad.addColorStop(0.5, '#3E2723');
panelGrad.addColorStop(1, '#4E342E');
ctx.fillStyle = panelGrad;
ctx.fill();
ctx.strokeStyle = 'rgba(255,255,255,0.3)';
ctx.lineWidth = 1;
ctx.stroke();

// Grid lines on panel
ctx.strokeStyle = 'rgba(255,255,255,0.3)';
ctx.lineWidth = 1;
for (let i = 1; i <= 2; i++) {
  ctx.beginPath();
  ctx.moveTo(px + 3, py + (ph * i) / 3);
  ctx.lineTo(px + pw - 3, py + (ph * i) / 3);
  ctx.stroke();
}
ctx.beginPath();
ctx.moveTo(0, py + 3);
ctx.lineTo(0, py + ph - 3);
ctx.stroke();

// Blue tint cells
ctx.fillStyle = 'rgba(100, 181, 246, 0.25)';
const cellPad = 4;
const cellW = (pw - 3 * cellPad) / 2;
const cellH = (ph - 4 * cellPad) / 3;
for (let row = 0; row < 3; row++) {
  for (let col = 0; col < 2; col++) {
    ctx.fillRect(px + cellPad + col * (cellW + cellPad), py + cellPad + row * (cellH + cellPad), cellW, cellH);
  }
}
ctx.restore();

// App name "Sinag"
ctx.save();
ctx.font = 'bold 72px "Segoe UI", sans-serif';
ctx.fillStyle = '#FFFFFF';
ctx.textBaseline = 'middle';
ctx.fillText('Sinag', 340, 190);

// Tagline
ctx.font = '26px "Segoe UI", sans-serif';
ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
ctx.fillText('Solar Calculator para sa Davao', 340, 260);

// Subtitle
ctx.font = '18px "Segoe UI", sans-serif';
ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
ctx.fillText('I-scan ang iyong electric bill. Makakuha ng solar estimate.', 340, 310);
ctx.restore();

// Decorative bottom wave
ctx.save();
ctx.beginPath();
ctx.moveTo(0, H);
ctx.lineTo(0, H - 30);
ctx.quadraticCurveTo(W * 0.25, H - 60, W * 0.5, H - 25);
ctx.quadraticCurveTo(W * 0.75, H + 10, W, H - 20);
ctx.lineTo(W, H);
ctx.closePath();
ctx.fillStyle = 'rgba(0, 0, 0, 0.08)';
ctx.fill();
ctx.restore();

// Small decorative dots
ctx.save();
ctx.globalAlpha = 0.08;
for (let i = 0; i < 60; i++) {
  const x = 600 + Math.random() * 400;
  const y = Math.random() * H;
  ctx.beginPath();
  ctx.arc(x, y, Math.random() * 3 + 1, 0, Math.PI * 2);
  ctx.fillStyle = '#fff';
  ctx.fill();
}
ctx.restore();
</script>
</body>
</html>
